# GitHub Pages: Settings > Pages > Build and deployment > Source: GitHub Actions
# Özel alan adı (hukukportali.com) kullanırken workflow içindeki env değişkenlerini güncelleyin:
#   NEXT_PUBLIC_BASE_PATH: "" (veya satırı kaldırın)
#   NEXT_PUBLIC_SITE_URL: "https://hukukportali.com"
name: Deploy Next.js to GitHub Pages
on:
  push:
    branches: ["main"]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /hukuk-portali
      NEXT_PUBLIC_SITE_URL: https://scurtel.github.io/hukuk-portali
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        run: npx next build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
